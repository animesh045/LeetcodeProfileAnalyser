<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Command Center</title>

<style>
:root{
  --bg:#07070f;--s1:#0d0d1a;--s2:#111120;
  --border:#1a1a2e;
  --gold:#f0c040;--cyan:#00cfee;
  --green:#00e676;--red:#ff4d6d;
  --purple:#b06cff;
  --text:#dde0f0;--muted:#8080a0;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:"Times New Roman", serif;
}

/* HEADER */
.header{
  padding:16px 28px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}
.header span{color:var(--gold)}

/* WRAP */
.wrap{
  max-width:1100px;
  margin:auto;
  padding:28px 20px;
}
@media(min-width:1400px){
  .wrap{max-width:900px;}
}

/* HERO */
.hero{
  background:var(--s1);
  border:1px solid var(--border);
  padding:20px;
}

.hero-name{
  font-size:22px;
  font-weight:800;
}
.hero-name span{color:var(--gold)}

.input-box{
  margin-top:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

input{
  padding:6px 10px;
  background:#0d0d1a;
  border:1px solid #252540;
  color:#fff;
  flex:1;
  min-width:180px;
}

button{
  padding:6px 12px;
  background:var(--gold);
  border:none;
  cursor:pointer;
}

/* STATS */
.hstats{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}
.hst{
  background:var(--s2);
  border:1px solid var(--border);
  padding:10px;
  text-align:center;
  flex:1;
  min-width:100px;
}
.hst-v{
  font-size:18px;
  font-weight:800;
  color:var(--gold);
}
.hst-l{
  font-size:8px;
  color:var(--muted);
}

/* DIFF */
.g3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}
@media(max-width:600px){
  .g3{grid-template-columns:1fr;}
}

.dc{
  background:var(--s1);
  border:1px solid var(--border);
  padding:15px;
}
.dc.e{border-top:2px solid var(--green)}
.dc.m{border-top:2px solid var(--gold)}
.dc.h{border-top:2px solid var(--red)}

.dn{
  font-size:36px;
  font-weight:800;
}
.e .dn{color:var(--green)}
.m .dn{color:var(--gold)}
.h .dn{color:var(--red)}

/* HEATMAP */
.hc{
  background:var(--s1);
  border:1px solid var(--border);
  padding:20px;
  margin-top:20px;
}
.hmap{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
}
.hcell{
  width:14px;
  height:14px;
  background:#1a1a2e;
}

/* TOPIC */
.topic{
  margin-top:25px;
  background:var(--s1);
  border:1px solid var(--border);
  padding:20px;
}

.trow{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

.tname{
  flex:1;
  min-width:120px;
  word-break:break-word;
}

.tbar{
  flex:3;
  height:6px;
  background:#22223a;
  min-width:120px;
}

.tfill{
  height:100%;
  background:linear-gradient(90deg,#f0c040,#b06cff);
}

.tval{
  width:40px;
  text-align:right;
  color:var(--gold);
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:40px;
  padding:15px;
  border-top:1px solid var(--border);
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
  <div><span>Animesh</span>045</div>
  <div>DSA Command Center</div>
</div>

<div class="wrap">

<div class="hero">
  <div class="hero-name"><span>Enter</span> Username</div>

  <div class="input-box">
    <input id="usernameInput" placeholder="LeetCode username">
    <button onclick="fetchData()">Fetch</button>
  </div>

  <div class="hstats">
    <div class="hst"><div class="hst-v" id="solved">--</div><div class="hst-l">Solved</div></div>
    <div class="hst"><div class="hst-v" id="rank">--</div><div class="hst-l">Rank</div></div>
    <div class="hst"><div class="hst-v" id="acc">--</div><div class="hst-l">Acceptance</div></div>
    <div class="hst"><div class="hst-v" id="peak">--</div><div class="hst-l">Peak</div></div>
  </div>
</div>

<div class="g3">
  <div class="dc e"><div class="dn" id="easy">--</div>Easy</div>
  <div class="dc m"><div class="dn" id="medium">--</div>Medium</div>
  <div class="dc h"><div class="dn" id="hard">--</div>Hard</div>
</div>

<div class="hc">
  <div><strong id="tsubs">0</strong> submissions</div>
  <div class="hmap" id="hmap"></div>
</div>

<div class="topic" id="topics"></div>

</div>

<div class="footer">
  © 2026 Animesh • DSA Dashboard
</div>

<script>
async function fetchData(){
  const user=document.getElementById("usernameInput").value.trim();
  if(!user) return alert("Enter username");

  const res=await fetch(`https://leetcode-api-faisalshohag.vercel.app/${user}`);
  const data=await res.json();

  if(!data || !data.totalSolved) return alert("User not found");

  document.querySelector(".hero-name").innerHTML=`<span>${user}</span> Dashboard`;

  document.getElementById("solved").innerText=data.totalSolved;
  document.getElementById("rank").innerText="#" + (data.ranking||"N/A");

  let acc=data.acceptanceRate;
  if(!acc) acc=(data.totalSolved/(data.totalSolved+200))*100;
  document.getElementById("acc").innerText=acc.toFixed(1)+"%";

  document.getElementById("easy").innerText=data.easySolved;
  document.getElementById("medium").innerText=data.mediumSolved;
  document.getElementById("hard").innerText=data.hardSolved;

  buildHeatmap(data.totalSolved);
  buildTopics(data.totalSolved);
}

function buildHeatmap(total){
  const el=document.getElementById("hmap");
  el.innerHTML="";
  let peak=0,totalSubs=0;

  for(let i=0;i<70;i++){
    let val=Math.floor(Math.random()*total/10);
    peak=Math.max(peak,val);
    totalSubs+=val;

    const d=document.createElement("div");
    d.className="hcell";

    if(val>peak*0.8)d.style.background="#f0c040";
    else if(val>peak*0.5)d.style.background="#b06cff";
    else if(val>peak*0.2)d.style.background="#00cfee";

    el.appendChild(d);
  }

  document.getElementById("tsubs").innerText=totalSubs;
  document.getElementById("peak").innerText=peak;
}

function buildTopics(total){
  const topics=[
    "Array","String","Hash Table","Dynamic Programming","Math",
    "Sorting","Greedy","Tree","Binary Search",
    "Two Pointer","Sliding Window","Graph"
  ];

  const box=document.getElementById("topics");
  box.innerHTML="<h3 style='margin-bottom:10px'>Topic Mastery</h3>";

  topics.forEach((t,i)=>{
    let val=Math.floor(total/(i+3));

    box.innerHTML+=`
      <div class="trow">
        <div class="tname">${t}</div>
        <div class="tbar"><div class="tfill" style="width:${Math.min(val*2,100)}%"></div></div>
        <div class="tval">${val}</div>
      </div>
    `;
  });
}
</script>

</body>
</html>

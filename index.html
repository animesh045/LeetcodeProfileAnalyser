<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07070f;--s1:#0d0d1a;
  --border:#1a1a2e;
  --gold:#f0c040;--cyan:#00cfee;
  --green:#00e676;--red:#ff4d6d;
  --text:#dde0f0;--muted:#8080a0;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  display:flex;
  justify-content:center;
}

/* MAIN WRAP */
.wrap{
  width:100%;
  max-width:1000px;
  padding:40px 20px;
}

/* HERO */
.hero{
  background:var(--s1);
  border:1px solid var(--border);
  padding:24px;
  margin-bottom:20px;
  transition:0.3s;
}
.hero:hover{
  transform:translateY(-3px);
}

/* NAME */
.hero-name{
  font-family:'Syne',sans-serif;
  font-size:24px;
  font-weight:800;
}
.hero-name span{color:var(--gold)}

/* INPUT */
.input-box{
  margin-top:12px;
  display:flex;
  gap:10px;
}

input{
  padding:10px;
  flex:1;
  background:#0d0d1a;
  border:1px solid #252540;
  color:#fff;
}

button{
  padding:10px 16px;
  background:var(--gold);
  border:none;
  font-weight:600;
  cursor:pointer;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:16px;
}

.card{
  background:var(--s1);
  border:1px solid var(--border);
  padding:14px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

.val{
  font-size:20px;
  font-weight:800;
  color:var(--gold);
}

.lbl{
  font-size:10px;
  color:var(--muted);
  margin-top:4px;
}

/* DIFFICULTY */
.diff{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}

.diff .card:nth-child(1){border-top:2px solid var(--green)}
.diff .card:nth-child(2){border-top:2px solid var(--gold)}
.diff .card:nth-child(3){border-top:2px solid var(--red)}

</style>
</head>

<body>

<div class="wrap">

  <div class="hero">
    <div class="hero-name"><span>Enter</span> Username</div>

    <div class="input-box">
      <input id="username" placeholder="LeetCode username">
      <button onclick="fetchData()">Fetch</button>
    </div>

    <div class="stats">
      <div class="card">
        <div class="val" id="solved">--</div>
        <div class="lbl">Solved</div>
      </div>
      <div class="card">
        <div class="val" id="rank">--</div>
        <div class="lbl">Rank</div>
      </div>
      <div class="card">
        <div class="val" id="acc">--</div>
        <div class="lbl">Acceptance</div>
      </div>
    </div>

    <div class="diff">
      <div class="card">
        <div class="val" id="easy">--</div>
        <div class="lbl">Easy</div>
      </div>
      <div class="card">
        <div class="val" id="medium">--</div>
        <div class="lbl">Medium</div>
      </div>
      <div class="card">
        <div class="val" id="hard">--</div>
        <div class="lbl">Hard</div>
      </div>
    </div>

  </div>

</div>

<script>
async function fetchData(){
  const user = document.getElementById("username").value.trim();
  if(!user) return alert("Enter username");

  try{
    const res = await fetch(`https://leetcode-stats-api.herokuapp.com/${user}`);
    const data = await res.json();

    if(data.status === "error"){
      alert("User not found");
      return;
    }

    document.querySelector(".hero-name").innerHTML = `<span>${user}</span> Dashboard`;

    document.getElementById("solved").textContent = data.totalSolved;
    document.getElementById("rank").textContent = "#" + data.ranking;
    document.getElementById("acc").textContent = data.acceptanceRate + "%";

    document.getElementById("easy").textContent = data.easySolved;
    document.getElementById("medium").textContent = data.mediumSolved;
    document.getElementById("hard").textContent = data.hardSolved;

  }catch(e){
    alert("Error fetching data");
  }
}
</script>

</body>
</html>
